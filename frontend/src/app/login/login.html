<!-- Background décoratif -->
<div class="bg-canvas">
  <div class="blob"></div>
  <div class="arc"></div>
  <div class="arc"></div>
  <div class="arc"></div>
</div>

<!-- Carte principale -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo Maroc Telecom (image) -->
    <div class="login-brand">
      <img
        src="images/maroc-telecom-logo2.jpg"
        alt="Maroc Telecom"
        class="brand-logo"
      />
    </div>

    <!-- Séparateur -->
    <div class="brand-divider"></div>

    <!-- Titre -->
    <h1 class="login-title">Bon retour</h1>
    <p class="login-subtitle">Connectez-vous à votre compte ARP</p>

    <!-- Erreur -->
    <div class="error-banner" *ngIf="errorMessage">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="login()" autocomplete="off">

      <div class="field-group">

        <!-- Identifiant -->
        <div class="field">
          <label for="login">Identifiant</label>
          <div class="field-inner">
            <input
              type="text"
              id="login"
              [(ngModel)]="loginUser"
              name="login"
              placeholder="Votre identifiant"
              required
              autocomplete="username"
            />
            <svg class="field-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>

        <!-- Mot de passe -->
        <div class="field">
          <label for="password">Mot de passe</label>
          <div class="field-inner">
            <input
              type="password"
              id="password"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <svg class="field-icon" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

      </div>

      <a class="forgot-link">Mot de passe oublié ?</a>

      <button type="submit" class="btn-connect">Se connecter</button>

    </form>

    <!-- Badge ARP -->
    <div class="arp-badge">
      <div class="arp-letters">
        <span>A</span><span>R</span><span>P</span>
      </div>
      <div class="arp-label">
        Avancement en temps Réel<br>de la Production TMA SIC
      </div>
    </div>

  </div>
</div>
